{% extends 'base.html' %}
{% block title %}{{ 'Edit League' if league else 'New League' }} — TourneyTracker{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h2 class="mb-4">
      <i class="bi bi-collection-fill text-warning me-2"></i>
      {{ 'Edit League' if league else 'New League' }}
    </h2>
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <form method="post">
          <div class="mb-4">
            <label class="form-label fw-semibold">League Name <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control" required autofocus
                   placeholder="e.g. Joe's Bar 8-Ball League"
                   value="{{ league.name if league else '' }}">
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-warning flex-fill">
              <i class="bi bi-check-circle me-1"></i>{{ 'Save Changes' if league else 'Create League' }}
            </button>
            <a href="{{ url_for('leagues.league_dashboard', lid=league.id) if league else url_for('leagues.league_list') }}"
               class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
